name: 'FailureMemory'
description: 'GitHub Action for CI failure triage: fingerprint recurring GitHub Actions failures and keep a rolling recurrence history'
author: 'UnguisAI'

branding:
  icon: 'alert-triangle'
  color: 'gray-dark'

inputs:
  fetch_mode:
    description: 'How to source logs: file for a workspace log file, github to fetch failed job logs via the GitHub API'
    required: false
    default: 'file'
  log_path:
    description: 'Path to a plain-text GitHub Actions log file to fingerprint when fetch_mode is file'
    required: false
  github_repository:
    description: 'Repository to fetch logs from in owner/repo form when fetch_mode is github. Defaults to GITHUB_REPOSITORY.'
    required: false
  github_token:
    description: 'Token used to call the GitHub API when fetch_mode is github. Falls back to GITHUB_TOKEN or GH_TOKEN and needs actions: read permission.'
    required: false
  github_run_id:
    description: 'Optional workflow run id to inspect in GitHub mode. When omitted, FailureMemory paginates completed workflow runs and picks the newest failed run.'
    required: false
  history_file:
    description: 'Path to the rolling JSON failure history file'
    required: false
    default: '.failurememory/history.json'
  max_runs:
    description: 'Maximum number of recent runs to retain per fingerprint'
    required: false
    default: '10'
  summary_file:
    description: 'Path to write the markdown summary for the current failure'
    required: false
    default: '.failurememory/failurememory-summary.md'

outputs:
  fingerprint:
    description: 'Stable fingerprint for the normalized failure excerpt'
  seen_count:
    description: 'How many times this fingerprint has been seen in local history'
  history_path:
    description: 'Path to the updated failure history JSON file'
  summary_path:
    description: 'Path to the generated markdown summary file'

runs:
  using: 'node24'
  main: 'dist/index.js'
